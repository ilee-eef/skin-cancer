<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Résultat - Skin Cancer </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f5ff; }
    .navbar { background: #6a0dad !important; }
    .btn-outline-light { border-color: #e8d5f5; color: #e8d5f5; }
    .btn-outline-light:hover { background: #e8d5f5; color: #6a0dad; }
    .btn-primary { background: #9b59b6; border-color: #9b59b6; }
    .btn-primary:hover { background: #8e44ad; border-color: #8e44ad; }
    .btn-outline-secondary { border-color: #c9a0dc; color: #9b59b6; }
    .btn-outline-secondary:hover { background: #c9a0dc; color: white; border-color: #c9a0dc; }
    .card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(106,13,173,0.08); }
    .progress-bar.bg-danger { background: #e91e8c !important; }
    .progress-bar.bg-success { background: #c471ed !important; }
  </style>
</head>
<body>

<nav class="navbar px-4 d-flex justify-content-between align-items-center">
  <span class="navbar-brand text-white fw-bold">🩺 Skin Cancer</span>
  <a href="/dashboard" class="btn btn-outline-light btn-sm">🏠 Dashboard</a>
</nav>

<div class="container mt-4" style="max-width: 560px;">
  <div class="card p-4">
    <h5 class="mb-3" style="color:#6a0dad;">📋 Résultat de l'analyse</h5>

    {% if result == 'Malignant' %}
    <div class="alert alert-danger d-flex align-items-center gap-2">
      <span style="font-size:1.5rem;">⚠️</span>
      <div>
        <div class="small text-muted">Diagnostic</div>
        <strong style="font-size:1.2rem;">Malignant</strong>
      </div>
    </div>
    {% else %}
    <div class="alert alert-success d-flex align-items-center gap-2">
      <span style="font-size:1.5rem;">✅</span>
      <div>
        <div class="small text-muted">Diagnostic</div>
        <strong style="font-size:1.2rem;">Bénign</strong>
      </div>
    </div>
    {% endif %}

    <div class="mb-4">
      <div class="d-flex justify-content-between small text-muted mb-1">
        <span>Taux de confiance</span>
        <strong>{{ prob }}%</strong>
      </div>
      <div class="progress" style="height:8px;">
        <div class="progress-bar {% if result == 'Malignant' %}bg-danger{% else %}bg-success{% endif %}"
             style="width:{{ prob }}%"></div>
      </div>
    </div>

    <div class="d-flex gap-2">
      <a href="/predict" class="btn btn-primary flex-fill">🔬 Nouvelle analyse</a>
      <a href="/patients" class="btn btn-outline-secondary flex-fill">📋 Historique</a>
    </div>

  </div>
</div>

</body>
</html>
