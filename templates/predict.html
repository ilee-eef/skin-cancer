<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analyse - Skin Cancer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f5ff; }
    .navbar { background: #6a0dad !important; }
    .form-control { border-radius: 8px; border: 1.5px solid #c9a0dc; }
    .form-control:focus { border-color: #9b59b6; box-shadow: 0 0 0 3px rgba(155,89,182,0.15); }
    .btn-primary { background: #9b59b6; border-color: #9b59b6; }
    .btn-primary:hover { background: #8e44ad; border-color: #8e44ad; }
    .btn-success { background: #c471ed; border-color: #c471ed; }
    .btn-success:hover { background: #a855c8; border-color: #a855c8; }
    .btn-outline-light { border-color: #e8d5f5; color: #e8d5f5; }
    .btn-outline-light:hover { background: #e8d5f5; color: #6a0dad; }
    .text-muted { color: #9b59b6 !important; }
    .text-success { color: #c471ed !important; }
    .card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(106,13,173,0.08); }
  </style>
</head>
<body>

<nav class="navbar px-4 d-flex justify-content-between align-items-center">
  <span class="navbar-brand text-white fw-bold">🩺 Skin Cancer</span>
  <a href="/dashboard" class="btn btn-outline-light btn-sm">← Retour</a>
</nav>

<div class="container mt-4" style="max-width: 560px;">

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
  {% endfor %}
  {% endwith %}

  <div class="card p-4">
    <h5 class="mb-4" style="color:#6a0dad;">🔬 Analyse patient</h5>

    <form method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label small text-muted">Nom du patient</label>
        <input class="form-control" type="text" name="name" required>
      </div>

      <div class="mb-3">
        <label class="form-label small text-muted">Âge</label>
        <input class="form-control" type="number" name="age" min="1" max="120" required>
      </div>

      <div class="mb-4">
        <label class="form-label small text-muted">Image de la lésion cutanée</label>
        <input class="form-control" type="file" name="image" accept="image/*" required
               onchange="document.getElementById('fname').textContent = '✓ ' + this.files[0].name">
        <small id="fname" class="text-success"></small>
      </div>

      <button class="btn btn-success w-100" type="submit">
        🧠 Lancer l'analyse
      </button>
    </form>
  </div>

</div>

</body>
</html>
