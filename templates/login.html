<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Skin Cancer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f5ff; }
    .navbar { background: #6a0dad !important; }
    .form-control { border-radius: 8px; border: 1.5px solid #c9a0dc; }
    .form-control:focus { border-color: #9b59b6; box-shadow: 0 0 0 3px rgba(155,89,182,0.15); }
    .btn-primary { background: #9b59b6; border-color: #9b59b6; }
    .btn-primary:hover { background: #8e44ad; border-color: #8e44ad; }
    .text-muted { color: #9b59b6 !important; }
    .card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(106,13,173,0.08); }
  </style>
</head>
<body class="min-vh-100 d-flex align-items-center" style="background:#f8f5ff;">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <div class="text-center mb-4">
          <div style="font-size:2.5rem;">🩺</div>
          <h4 class="mt-2 mb-1" style="color:#6a0dad;">Skin Cancer</h4>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label small text-muted">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label small text-muted">Mot de passe</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
      </div>
    </div>
  </div>
</div>

</body>
</html>
