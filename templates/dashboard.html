<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Skin Cancer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f5ff; }
    .navbar { background: #6a0dad !important; }
    .btn-primary { background: #9b59b6; border-color: #9b59b6; }
    .btn-primary:hover { background: #8e44ad; border-color: #8e44ad; }
    .btn-outline-secondary { border-color: #c9a0dc; color: #9b59b6; }
    .btn-outline-secondary:hover { background: #c9a0dc; color: white; border-color: #c9a0dc; }
    .btn-outline-danger { border-color: #e91e8c; color: #e91e8c; }
    .btn-outline-danger:hover { background: #e91e8c; color: white; }
    .btn-outline-light { border-color: #e8d5f5; color: #e8d5f5; }
    .btn-outline-light:hover { background: #e8d5f5; color: #6a0dad; }
    .card { border-radius: 16px; border: none; box-shadow: 0 4px 20px rgba(106,13,173,0.08); }
  </style>
</head>
<body>

<nav class="navbar px-4 d-flex justify-content-between align-items-center">
  <span class="navbar-brand text-white fw-bold">🩺 Skin Cancer</span>
  <a href="/logout" class="btn btn-outline-light btn-sm">Déconnexion</a>
</nav>

<div class="container mt-5" style="max-width: 560px;">
  <div class="card p-4">
    <h5 class="mb-4 text-center" style="color:#6a0dad;">Que voulez-vous faire ?</h5>
    <div class="d-grid gap-3">
      <a href="/predict" class="btn btn-primary btn-lg">🔬 Nouvelle analyse</a>
      <a href="/patients" class="btn btn-outline-secondary btn-lg">📋 Historique patients</a>
      <a href="/logout" class="btn btn-outline-danger btn-lg">🚪 Déconnexion</a>
    </div>
  </div>
</div>

</body>
</html>
